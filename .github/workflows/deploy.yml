name: Build and Deploy Pushbird Game

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment (Using Node 18)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: projects/pushbird/package.json

      - name: Install Project Dependencies
        run: |
          cd projects/pushbird
          npm install

      # FIXED: 1. Create a master staging area folder
      #        2. Copy your ENTIRE main portfolio repository into it first (restoring your website)
      #        3. Compile the Vite game inside the subfolder, completely preserving your main paths
      - name: Build Static Production Assets with Vite
        run: |
          mkdir -p staging_deploy
          
          # Copy your existing main portfolio files, avoiding loop copies of the deployment folder
          rsync -arv --exclude='staging_deploy' --exclude='.git' --exclude='.github' ./ staging_deploy/
          
          # Move inside and compile the sub-project game files
          cd projects/pushbird
          npm run build
          
          # Inject the compiled game files safely back into the main portfolio's subfolder
          mkdir -p ../../staging_deploy/projects/pushbird
          cp -r dist/* ../../staging_deploy/projects/pushbird/

      - name: Setup GitHub Pages Deployment Configuration
        uses: actions/configure-pages@v5

      # FIXED: Tell GitHub to upload the entire integrated staging directory containing both modules
      - name: Upload Compiled Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging_deploy' # Deploys your portfolio at root, and the game inside its subfolder

      - name: Deploy Live to GitHub Pages Server Environment
        id: deployment
        uses: actions/deploy-pages@v4
