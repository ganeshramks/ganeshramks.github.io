name: Build and Deploy Pushbird Game

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment (Using Node 18)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: projects/pushbird/package.json

      - name: Install Project Dependencies
        run: |
          cd projects/pushbird
          npm install

      - name: Build Static Production Assets with Vite
        run: |
          # 1. Create a master staging area folder
          mkdir -p staging_deploy
          
          # 2. Copy your ENTIRE main portfolio repository into it first
          rsync -arv --exclude='staging_deploy' --exclude='.git' --exclude='.github' ./ staging_deploy/
          
          # 3. Move inside the sub-project directory
          cd projects/pushbird
          
          # 4. Compile the Vite game directly into the staging subfolder using an absolute path.
          # This completely overwrites the raw, uncompiled index.html with the production assets.
          npm run build -- --outDir "$GITHUB_WORKSPACE/staging_deploy/projects/pushbird"

      - name: Setup GitHub Pages Deployment Configuration
        uses: actions/configure-pages@v5

      - name: Upload Compiled Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging_deploy'

      - name: Deploy Live to GitHub Pages Server Environment
        id: deployment
        uses: actions/deploy-pages@v4
