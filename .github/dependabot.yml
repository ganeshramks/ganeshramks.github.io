version: 2
updates:
  # Configuration for your root folder
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 2

  # Configuration for your pushbird sub-project
  - package-ecosystem: "npm"
    directory: "/projects/pushbird"
    schedule:
      interval: "weekly"
    groups:
      pushbird-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 2
