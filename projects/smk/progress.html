<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shambhavi Progress</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; margin: 0; }
        .stats-container { display: flex; flex-direction: column; align-items: center; gap: 20px; position:relative; top:-4% }
        .row { display: flex; gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; min-width: 150px; border: 1px solid #333; }
        .streak-card { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 340px; border: 2px solid darkred; margin-bottom: 20px; }
        .count { font-size: 3.5rem; color: #ff3333; font-weight: bold; margin: 10px 0; }
        .streak-count { font-size: 5rem; color: #ffcc00; font-weight: bold; }
        .label { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; color: #888; }
        
        /* Styled text label for the timestamp */
        .timestamp-label { margin-top: 10px; font-size: 0.9rem; color: #aaaaaa; font-style: italic; }
        
        .footer-nav { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        a { color: #9e9e9e; text-decoration: none; font-size: 0.9rem; }
        
        .reset-btn { 
            background: none; 
            border: 1px solid #333; 
            color: #444; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 0.7rem;
            position: relative;
            top: 190%;
        }
        .reset-btn:hover { color: #ff3333; border-color: #ff3333; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="streak-card">
            <div class="label">🔥 Daily Streak</div>
            <div id="streak" class="streak-count">0</div>
            <div class="label">Days in a row</div>
        </div>

        <div class="row">
            <div class="card">
                <div class="label">☀️ Morning</div>
                <div id="m-count" class="count">0</div>
            </div>
            <div class="card">
                <div class="label">🌙 Evening</div>
                <div id="e-count" class="count">0</div>
            </div>
        </div>

        <!-- Interactive timestamp container -->
        <div id="last-practiced" class="timestamp-label">Last practiced: Never</div>
    </div>

    <div class="footer-nav">
        <a href="index.html">← Back</a>
        <button class="reset-btn" onclick="resetStats()">Reset Progress</button>
    </div>

    <script>
        function getRelativeTimeString(date) {
            const now = new Date();
            const diffMs = now - date;
            
            if (diffMs < 0) return "Just now"; 

            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHrs = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHrs / 24);

            if (diffDays >= 1) {
                const remainingHrs = diffHrs % 24;
                return `${diffDays}d ${remainingHrs}h ago`;
            }
            
            if (diffHrs >= 1) {
                const remainingMins = diffMins % 60;
                return `${diffHrs}h ${remainingMins}m ago`;
            }
            
            if (diffMins >= 1) {
                return `${diffMins}m ago`;
            }

            return "Just now";
        }

        function formatExactTime(date) {
            const dateStr = date.toDateString();
            let hours = date.getHours();
            const minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // Handle midnight (0 hours)
            const minutesStr = minutes < 10 ? '0' + minutes : minutes;
            
            return `${dateStr}, ${hours}:${minutesStr} ${ampm}`;
        }

        function updateDisplay() {
            document.getElementById('m-count').innerText = localStorage.getItem('morningCount') || '0';
            document.getElementById('e-count').innerText = localStorage.getItem('eveningCount') || '0';
            
            // Streak handling logic
            const lastPracticeDate = localStorage.getItem('lastPracticeDate');
            let streak = parseInt(localStorage.getItem('dailyStreak') || '0');

            if (lastPracticeDate) {
                const lastDate = new Date(lastPracticeDate);
                const today = new Date();
                
                // Copy dates to strip hours for absolute streak day-boundary calculation
                const streakToday = new Date(today);
                const streakLast = new Date(lastDate);
                streakToday.setHours(0,0,0,0);
                streakLast.setHours(0,0,0,0);
                
                const diffTime = Math.abs(streakToday - streakLast);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays > 1) {
                    streak = 0;
                    localStorage.setItem('dailyStreak', '0');
                }

                // Format and display the dual timestamp output string
                const exactTimeStr = formatExactTime(lastDate);
                const timeAgoStr = getRelativeTimeString(lastDate);
                document.getElementById('last-practiced').innerText = `Last practiced: ${exactTimeStr} (${timeAgoStr})`;
            } else {
                document.getElementById('last-practiced').innerText = "Last practiced: Never";
            }
            document.getElementById('streak').innerText = streak;
        }

        function resetStats() {
            if (confirm("Are you sure? This will delete your streak and session counts forever.")) {
                localStorage.clear();
                updateDisplay();
            }
        }

        // Initial load
        updateDisplay();
    </script>
</body>
</html>
