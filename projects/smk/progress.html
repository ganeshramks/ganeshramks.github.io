<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shambhavi Progress</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; margin: 0; }
        .stats-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .row { display: flex; gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; min-width: 150px; border: 1px solid #333; }
        .streak-card { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 340px; border: 2px solid darkred; margin-bottom: 20px; }
        .count { font-size: 3.5rem; color: #ff3333; font-weight: bold; margin: 10px 0; }
        .streak-count { font-size: 5rem; color: #ffcc00; font-weight: bold; }
        .label { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; color: #888; }
        
        .footer-nav { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        a { color: #555; text-decoration: none; font-size: 0.9rem; }
        
        .reset-btn { 
            background: none; 
            border: 1px solid #333; 
            color: #444; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 0.7rem;
        }
        .reset-btn:hover { color: #ff3333; border-color: #ff3333; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="streak-card">
            <div class="label">🔥 Daily Streak</div>
            <div id="streak" class="streak-count">0</div>
            <div class="label">Days in a row</div>
        </div>

        <div class="row">
            <div class="card">
                <div class="label">☀️ Morning</div>
                <div id="m-count" class="count">0</div>
            </div>
            <div class="card">
                <div class="label">🌙 Evening</div>
                <div id="e-count" class="count">0</div>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <a href="index.html">← Back</a>
        <button class="reset-btn" onclick="resetStats()">Reset All Progress</button>
    </div>

    <script>
        function updateDisplay() {
            document.getElementById('m-count').innerText = localStorage.getItem('morningCount') || '0';
            document.getElementById('e-count').innerText = localStorage.getItem('eveningCount') || '0';
            
            // Streak handling logic
            const lastPracticeDate = localStorage.getItem('lastPracticeDate');
            let streak = parseInt(localStorage.getItem('dailyStreak') || '0');

            if (lastPracticeDate) {
                const lastDate = new Date(lastPracticeDate);
                const today = new Date();
                today.setHours(0,0,0,0);
                lastDate.setHours(0,0,0,0);
                
                const diffTime = Math.abs(today - lastDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays > 1) {
                    streak = 0;
                    localStorage.setItem('dailyStreak', '0');
                }
            }
            document.getElementById('streak').innerText = streak;
        }

        function resetStats() {
            if (confirm("Are you sure? This will delete your streak and session counts forever.")) {
                localStorage.clear();
                updateDisplay();
            }
        }

        // Initial load
        updateDisplay();
    </script>
</body>
</html>
