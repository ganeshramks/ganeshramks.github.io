<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shambhavi Mahamudra Kriya</title>
    <link rel="icon" type="image/png" href="sadhguruIcon.png">

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 92%;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: darkred;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #b30000; }
        #status { margin-top: 15px; font-weight: bold; min-height: 1.2em; color: #ffffff; }
        /* Style for the countdown timer */
        #timer-display { font-size: 1rem; color: #ffcc00; margin-top: 10px; font-family: monospace; height: 1.2rem; }
        .nav-link { margin-top: 20px; display: block; color: #555; text-decoration: none; font-size: 0.8rem; visibility:hidden; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Files are in the same folder, so no ../ needed -->
        <img src="sadhguru.png" alt="Sadhguru Image">
        <img src="flame.webp" style="
            position: absolute;
            top: 80%;
            left: 46%;
        ">
        <div style="width: 70%; position: relative; left: 85%;">
            <button id="startBtn" onclick="startTimer()">▶</button>
            <p id="status"></p>
            <!-- Element to show the countdown -->
            <div id="timer-display">Shambhavi Mahamudra Kriya</div>
            <a href="progress.html" id="view-progress" class="nav-link">View Progress</a>
        </div>
    </div>

    <script>
        // const intervals = [0.05, 0.05, 0.05, 0.05, 0.05];
        const intervals = [0.2, 6.1, 6.35, 3.2, 6];
        const stepTitles = [
            "Starting", 
            "Sukha Kriya", 
            "Aum Chanting", 
            "Fluttering Of Breath", 
            "Bandhas & Observation"
        ];

        let step = 0;
        let countdownInterval; // Variable to hold the per-second interval
        const bell = new Audio('bell.mp3');

        // Helper to determine current time block
        function getCurrentBlock() {
            const hour = new Date().getHours();
            return (hour < 13) ? 'morningCount' : 'eveningCount'; // 1 PM Cutoff
        }

        function playBell() {
            bell.currentTime = 0; 
            bell.play().catch(e => console.error("Audio play failed:", e));
        }

        function saveProgress() {
            const now = new Date();
            const todayStr = now.toDateString();
            const type = getCurrentBlock();
            const lastDateKey = 'lastDate_' + type;

            // 1. Update Session Counts
            let currentCount = parseInt(localStorage.getItem(type) || '0');
            localStorage.setItem(type, currentCount + 1);
            localStorage.setItem(lastDateKey, todayStr);

            // 2. Update Daily Streak
            const lastTotalDate = localStorage.getItem('lastPracticeDate');
            let streak = parseInt(localStorage.getItem('dailyStreak') || '0');

            if (!lastTotalDate) {
                streak = 1; 
            } else {
                const lastDate = new Date(lastTotalDate);
                
                // FIXED LOGIC: Normalize both to Midnight for a clean calendar day comparison
                const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const lastMidnight = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());

                const diffTime = todayMidnight - lastMidnight;
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    streak += 1; // It was yesterday, continue streak
                } else if (diffDays > 1) {
                    streak = 1; // Skipped a day, restart streak
                }
                // If diffDays is 0 (already practiced today), streak stays the same
            }
            
            localStorage.setItem('dailyStreak', streak);
            // Modified to store full detailed timestamp string instead of date-only
            localStorage.setItem('lastPracticeDate', now.toString());

            // 3. Redirect after 7 seconds
            setTimeout(() => {
                window.location.href = 'progress.html';
            }, 7000);
        }

        function updateCountdown(seconds) {
            const display = document.getElementById("timer-display");
            
            clearInterval(countdownInterval);
            
            let timeRemaining = seconds;

            const render = () => {
                const mins = Math.floor(timeRemaining / 60);
                const secs = Math.round(timeRemaining % 60);
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            render();

            countdownInterval = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval);
                    display.innerText = ""; // Clear when done
                } else {
                    render();
                }
            }, 1000);
        }

        function startTimer() {
            const now = new Date();
            const todayStr = now.toDateString();
            const type = getCurrentBlock();
            const lastDateKey = 'lastDate_' + type;

            // GAP CHECK LOGIC: Enforce a minimum 5-hour gap from the last practice timestamp
            const lastTotalDate = localStorage.getItem('lastPracticeDate');
            if (lastTotalDate) {
                const lastPracticeTime = new Date(lastTotalDate);
                const timeDiffMs = now - lastPracticeTime;
                const hoursPassed = timeDiffMs / (1000 * 60 * 60);

                if (hoursPassed < 5) {
                    const remainingHours = (5 - hoursPassed).toFixed(1);
                    document.getElementById("status").innerText = `You can practice again after ${remainingHours}h`;
                    document.getElementById("view-progress").style.visibility = "visible";
                    return;
                }
            }

            // PREVENTION LOGIC: Check if session is already done today
            if (localStorage.getItem(lastDateKey) === todayStr) {
                const sessionName = (type === 'morningCount') ? "Morning" : "Evening";
                document.getElementById("status").innerText = `You have already completed your ${sessionName} practice today.`;
                document.getElementById("view-progress").style.visibility = "visible";
                return;
            }

            document.getElementById("startBtn").style.visibility = "hidden";

            if (step >= intervals.length) {
                document.getElementById("status").innerText = "Shambhavi Mahamudra Kriya complete!";
                document.getElementById("timer-display").innerText = ""; 
                saveProgress();
                return;
            }
            
            document.getElementById("status").innerText = stepTitles[step];
            
            // Start the visual countdown
            const totalSeconds = intervals[step] * 60;
            updateCountdown(totalSeconds);

            setTimeout(() => {
                playBell();
                step++;
                startTimer(); 
            }, totalSeconds * 1000);
        }

    </script>
</body>
</html>
